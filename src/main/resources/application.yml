spring:
  application:
    name: card_nav
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:card_nav}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Redis（用于 AI 删除验证 code，TTL 5 分钟）
  # 占位：连接信息从环境变量读取。dev profile 可在 application-dev.yml 覆盖。
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: ${REDIS_TIMEOUT_MS}
  # QQ SMTP（用于发送删除验证码）
  mail:
    host: ${QQ_MAIL_HOST:smtp.qq.com}
    port: ${QQ_MAIL_PORT:465}
    username: ${QQ_MAIL:NOT_SET}
    password: ${QQ_AUTH_CODE:NOT_SET}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tao.card_nav.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:3002}

# AI 删除卡片所需的接收邮箱（QQ 邮箱）。
# 占位符从环境变量读取。NOT_SET 启动时 fail-fast（见 StartupConfig）。
# 申请授权码：登录 QQ 邮箱 → 设置 → 账户 → POP3/IMAP/SMTP/Exchange/CardDAV/CalDAV服务 → 开启服务 → 生成授权码
card-nav:
  security:
    delete-confirmation: ${CARD_NAV_SECURITY_DELETE_CONFIRMATION}
    delete-recipient-email: ${CARD_NAV_DELETE_RECIPIENT:NOT_SET}

resilience4j:
  ratelimiter:
    instances:
      aiChatByIp:
        # 每 IP 每分钟 10 次（默认配置，可通过 AI_CHAT_RATE_LIMIT_* 环境变量覆盖）
        limit-for-period: ${AI_CHAT_RATE_LIMIT_PER_MINUTE:5}
        limit-refresh-period: 1m
        # 超额立即拒绝，不排队等待令牌
        timeout-duration: 0
        # 同一实例可创建的子限流器上限（防止恶意构造大量 IP 撑爆内存）
        max-allowable-tags: 10000

# Actuator / Micrometer Prometheus 指标暴露
# 抓取端点：GET /actuator/prometheus
# 生产环境建议配合反向代理做访问控制（内网/VPN），不要直接公网暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true