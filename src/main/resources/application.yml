spring:
  application:
    name: card_nav
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:card_nav}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tao.card_nav.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:3002}

# AI 删除卡片所需的确认指令。
# 占位符从环境变量读取，dotenv 加载 .env 后会注入到 System Properties。
# 注意：未配置 CARD_NAV_SECURITY_DELETE_CONFIRMATION 时应用启动失败（fail-fast）。
card-nav:
  security:
    delete-confirmation: ${CARD_NAV_SECURITY_DELETE_CONFIRMATION}

resilience4j:
  ratelimiter:
    instances:
      aiChatByIp:
        # 每 IP 每分钟 5 次（默认配置，可通过 AI_CHAT_RATE_LIMIT_* 环境变量覆盖）
        limit-for-period: ${AI_CHAT_RATE_LIMIT_PER_MINUTE:5}
        limit-refresh-period: 1m
        # 超额立即拒绝，不排队等待令牌
        timeout-duration: 0
        # 同一实例可创建的子限流器上限（防止恶意构造大量 IP 撑爆内存）
        max-allowable-tags: 10000
